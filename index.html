<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaKookverse • Fantasy Surf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); font-family: system-ui, sans-serif; }
    .wave-bg {
      background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1506929562872-bb421503ef8f?ixlib=rb-4.0.3&auto=format&fit=crop&q=80');
      background-size: cover; background-position: center;
    }
    .table-container { overflow-x: auto; }
    th, td { padding: 12px 8px; text-align: center; }
    .future { color: #64748b; font-style: italic; }
    .owner-col { font-size: 0.9rem; color: #94a3b8; }
  </style>
</head>
<body class="min-h-screen text-white">

  <div class="wave-bg py-16 text-center">
    <h1 class="text-5xl md:text-6xl font-bold">METAKOOKVERSE</h1>
    <p class="text-3xl text-teal-300">Fantasy Surf League</p>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-semibold">Current Standings</h2>
      <div id="last-updated" class="text-sm text-slate-400"></div>
    </div>

    <div class="table-container bg-slate-900/70 backdrop-blur-lg rounded-2xl border border-slate-700">
      <table class="w-full" id="standings">
        <thead class="bg-slate-800"><tr id="header-row"></tr></thead>
        <tbody id="table-body" class="divide-y divide-slate-700"></tbody>
      </table>
    </div>

    <div id="error" class="hidden mt-8 p-6 bg-red-900/50 border border-red-700 rounded-2xl text-red-200"></div>
  </div>

  <script>
    async function loadCSV() {
      const res = await fetch('./scores.csv?' + Date.now());
      if (!res.ok) throw new Error("scores.csv missing");
      const text = await res.text();
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(",").map(h => h.trim());
      
      return lines.slice(1).map(line => {
        const values = line.split(",").map(v => v.trim());
        const row = {};
        headers.forEach((h, i) => {
          row[h.toLowerCase()] = values[i] ?? "";
        });
        return row;
      });
    }

    function toNumber(x) {
      if (!x || x === "" || x === "-") return null;
      const n = Number(x);
      return Number.isFinite(n) ? n : null;     // ← Now accepts 0 and 000.00
    }

    function computeStandings(rows) {
      const eventNames = Object.keys(rows[0]).filter(k => 
        !["team", "owner", "total"].includes(k)
      );

      return rows.map(r => {
        const scores = {};
        let completed = [];

        eventNames.forEach(ev => {
          const val = toNumber(r[ev]);
          scores[ev] = val;
          if (val !== null) completed.push(val);
        });

        const total = completed.reduce((a,b) => a + b, 0);
        let dropped = null;
        let final = total;

        if (completed.length >= 2) {
          dropped = Math.min(...completed);
          final = total - dropped;
        }

        return {
          team: r.team || "Unknown",
          owner: r.owner || "-",
          total: total.toFixed(2),
          dropped: dropped !== null ? dropped.toFixed(2) : "-",
          final: final.toFixed(2),
          eventScores: scores,
          events: eventNames
        };
      }).sort((a,b) => parseFloat(b.final) - parseFloat(a.final));
    }

    function renderTable(data) {
      const header = document.getElementById("header-row");
      const tbody = document.getElementById("table-body");
      const events = data[0].events;

      header.innerHTML = `
        <th class="w-12">#</th>
        <th class="text-left pl-6">Team</th>
        <th class="text-left">Owner</th>
        ${events.map(e => `<th>${e}</th>`).join('')}
        <th>Total</th>
        <th>Dropped</th>
        <th class="font-bold bg-teal-900/60">Final</th>
      `;

      tbody.innerHTML = "";
      data.forEach((row, i) => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-slate-800/70";

        let cells = row.events.map(ev => {
          const score = row.eventScores[ev];
          if (score === null) return `<td class="future">—</td>`;

          const completedVals = Object.values(row.eventScores).filter(v => v !== null);
          const isDropped = completedVals.length >= 2 && score === Math.min(...completedVals);

          return `<td class="${isDropped ? 'text-orange-400 line-through' : 'text-slate-200'}">
                    ${score.toFixed(2)}
                  </td>`;
        }).join("");

        tr.innerHTML = `
          <td class="text-center font-mono text-slate-400">${i+1}</td>
          <td class="font-medium text-left pl-6">${row.team}</td>
          <td class="text-left owner-col">${row.owner}</td>
          ${cells}
          <td class="font-medium">${row.total}</td>
          <td class="text-orange-400">${row.dropped}</td>
          <td class="font-bold text-teal-400 text-xl">${row.final}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function main() {
      try {
        const rows = await loadCSV();
        const standings = computeStandings(rows);
        renderTable(standings);
        document.getElementById("last-updated").textContent = `Last updated: ${new Date().toLocaleDateString('en-US', {month:'long', day:'numeric'})}`;
      } catch (e) {
        console.error(e);
        document.getElementById("error").classList.remove("hidden");
        document.getElementById("error").innerHTML = "Error loading scores.csv";
      }
    }

    window.onload = main;
  </script>
</body>
</html>
