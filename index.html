<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaKookverse • Fantasy Surf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      font-family: 'Inter', system-ui, sans-serif;
    }
    .wave-bg {
      background-image: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('https://images.unsplash.com/photo-1506929562872-bb421503ef8f?ixlib=rb-4.0.3&auto=format&fit=crop&q=80');
      background-size: cover;
      background-position: center;
    }
    table {
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 12px;
    }
    tr:nth-child(even) {
      background-color: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body class="min-h-screen text-white">
  <!-- Header -->
  <div class="wave-bg py-16 text-center">
    <div class="max-w-4xl mx-auto px-6">
      <h1 class="text-5xl md:text-6xl font-bold mb-4 tracking-tight">
        METAKOOKVERSE
      </h1>
      <p class="text-2xl md:text-3xl text-teal-300 font-light">
        Fantasy Surf League
      </p>
      <div class="mt-6 flex justify-center gap-6 text-sm">
        <a href="https://fantasy.worldsurfleague.com/fantasy/leagues?leagueCode=AJAUYAKH" 
           target="_blank"
           class="flex items-center gap-2 hover:text-teal-400 transition-colors">
          <i class="fas fa-external-link-alt"></i>
          Official League Page
        </a>
        <a href="https://github.com/parkerwood10/Metakookverse" 
           target="_blank"
           class="flex items-center gap-2 hover:text-teal-400 transition-colors">
          <i class="fab fa-github"></i>
          GitHub Repo
        </a>
      </div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h2 class="text-3xl font-semibold">Current Standings</h2>
        <p class="text-slate-400">Lowest event score dropped (after 2+ events)</p>
      </div>
      <div id="last-updated" class="text-sm text-slate-400"></div>
    </div>

    <!-- Standings Table -->
    <div class="bg-slate-900/70 backdrop-blur-lg rounded-2xl overflow-hidden border border-slate-700 shadow-2xl">
      <table class="w-full text-left" id="standings">
        <thead class="bg-slate-800 border-b border-slate-700">
          <tr>
            <th class="w-12">#</th>
            <th>Team</th>
            <th class="text-center">Total Score</th>
            <th class="text-center">Dropped</th>
            <th class="text-center font-bold">Final Score</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-700 text-slate-200"></tbody>
      </table>
    </div>

    <div id="error" class="hidden mt-6 p-4 bg-red-900/50 border border-red-700 rounded-xl text-red-200"></div>

    <!-- Footer Info -->
    <div class="mt-12 text-center text-slate-500 text-sm">
      <p>Updated automatically when <code class="bg-slate-800 px-1.5 py-0.5 rounded">scores.csv</code> is pushed</p>
      <p class="mt-2">Made with ❤️ for the kookiest crew on the WSL</p>
    </div>
  </div>

  <script>
    async function loadCSV() {
      const response = await fetch('./scores.csv');
      if (!response.ok) throw new Error('Failed to load scores.csv');
      const text = await response.text();
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(",").map(s => s.trim());
      
      return lines.slice(1).map(line => {
        const cells = line.split(",").map(s => s.trim());
        const row = {};
        headers.forEach((h, i) => {
          row[h] = cells[i] ?? "";
        });
        return row;
      });
    }

    function toNumber(x) {
      if (x === "" || x == null) return null;
      const n = Number(x);
      return Number.isFinite(n) ? n : null;
    }

    function computeStandings(rows) {
      if (!rows || rows.length === 0) return [];
      
      const eventNames = Object.keys(rows[0]).filter(k => 
        k !== "team" && k.toLowerCase() !== "total"
      );

      return rows.map(r => {
        const scores = eventNames
          .map(e => toNumber(r[e]))
          .filter(v => v != null);

        const total = scores.reduce((a, b) => a + b, 0);
        let dropped = null;
        let totalAfterDrop = total;

        if (scores.length >= 2) {
          dropped = Math.min(...scores);
          totalAfterDrop = total - dropped;
        }

        return {
          team: r.team || "Unknown Team",
          total: total.toFixed(2),
          dropped: dropped !== null ? dropped.toFixed(2) : "-",
          totalAfterDrop: totalAfterDrop.toFixed(2)
        };
      }).sort((a, b) => parseFloat(b.totalAfterDrop) - parseFloat(a.totalAfterDrop));
    }

    function renderTable(standings) {
      const tbody = document.querySelector("#standings tbody");
      tbody.innerHTML = "";

      standings.forEach((s, idx) => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-slate-800/70 transition-colors";
        tr.innerHTML = `
          <td class="text-center font-mono text-slate-400">${idx + 1}</td>
          <td class="font-medium">${s.team}</td>
          <td class="text-center text-slate-400">${s.total}</td>
          <td class="text-center text-orange-400">${s.dropped}</td>
          <td class="text-center font-bold text-teal-400 text-lg">${s.totalAfterDrop}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function main() {
      const errorDiv = document.getElementById("error");
      try {
        const rows = await loadCSV();
        const standings = computeStandings(rows);
        renderTable(standings);
        
        // Update timestamp
        document.getElementById("last-updated").textContent = 
          `Last updated: ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
        
      } catch (err) {
        console.error(err);
        errorDiv.classList.remove("hidden");
        errorDiv.textContent = "⚠️ Could not load scores.csv — make sure the file exists in the repository root.";
      }
    }

    // Run on load
    window.onload = main;
  </script>
</body>
</html>
