<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaKookverse • Fantasy Surf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); 
      font-family: system-ui, sans-serif; 
    }
    .wave-bg {
      background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com/photo-1506929562872-bb421503ef8f?ixlib=rb-4.0.3&auto=format&fit=crop&q=80');
      background-size: cover; 
      background-position: center;
    }
    .table-container { overflow-x: auto; scrollbar-width: thin; }
    
    th, td { 
      padding: 10px 6px; 
      text-align: center;
      white-space: nowrap;
    }
    
    th {
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    th:hover {
      background-color: #334155;
    }
    .future {
      color: #64748b;
      font-style: italic;
      font-size: 0.82rem;
      opacity: 0.75;
    }
    .team-cell {
      text-align: left;
      min-width: 170px;
    }
    .team-name {
      font-weight: 600;
      font-size: 1rem;
    }
    .owner-name {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      th, td { padding: 9px 5px; font-size: 0.9rem; }
      .team-name { font-size: 0.95rem; }
      .owner-name { font-size: 0.78rem; }
    }
  </style>
</head>
<body class="min-h-screen text-white">

  <div class="wave-bg py-12 md:py-16 text-center">
    <h1 class="text-5xl md:text-6xl font-bold tracking-tight">METAKOOKVERSE</h1>
    <p class="text-2xl md:text-3xl text-teal-300 mt-2">Fantasy Surf League</p>
  </div>

  <div class="max-w-7xl mx-auto px-4 md:px-6 py-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
      <div>
        <h2 class="text-2xl md:text-3xl font-semibold">Current Standings</h2>
        <p class="text-slate-400 text-sm md:text-base">Click column headers to sort • Lowest event dropped</p>
      </div>
      <div id="last-updated" class="text-xs md:text-sm text-slate-400"></div>
    </div>

    <div class="table-container bg-slate-900/70 backdrop-blur-lg rounded-2xl border border-slate-700 shadow-xl">
      <table class="w-full" id="standings">
        <thead class="bg-slate-800 sticky top-0 z-10">
          <tr id="header-row"></tr>
        </thead>
        <tbody id="table-body" class="divide-y divide-slate-700"></tbody>
      </table>
    </div>

    <div id="error" class="hidden mt-8 p-6 bg-red-900/50 border border-red-700 rounded-2xl text-red-200"></div>
  </div>

  <script>
    let currentSort = { column: 'final', direction: 'desc' }; // default sort

    async function loadCSV() {
      const res = await fetch('./scores.csv?' + Date.now());
      if (!res.ok) throw new Error("scores.csv missing");
      const text = await res.text();
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(",").map(h => h.trim());
      
      return lines.slice(1).map(line => {
        const values = line.split(",").map(v => v.trim());
        const row = {};
        headers.forEach((h, i) => {
          row[h.toLowerCase()] = values[i] ?? "";
        });
        return row;
      });
    }

    function toNumber(x) {
      if (!x || x === "" || x === "-") return null;
      const n = Number(x);
      return Number.isFinite(n) ? n : null;
    }

    function computeStandings(rows) {
      const eventNames = Object.keys(rows[0]).filter(k => 
        !["team", "owner", "total"].includes(k)
      );

      return rows.map(r => {
        const scores = {};
        let completed = [];

        eventNames.forEach(ev => {
          const val = toNumber(r[ev]);
          scores[ev] = val;
          if (val !== null) completed.push(val);
        });

        const total = completed.reduce((a,b) => a + b, 0);
        let dropped = null;
        let final = total;

        if (completed.length >= 2) {
          dropped = Math.min(...completed);
          final = total - dropped;
        }

        return {
          team: r.team || "Unknown",
          owner: r.owner || "-",
          total: total.toFixed(2),
          dropped: dropped !== null ? dropped.toFixed(2) : "-",
          final: final.toFixed(2),
          eventScores: scores,
          events: eventNames,
          rawTotal: total,
          rawFinal: final,
          rawDropped: dropped
        };
      });
    }

    function sortData(data, column, direction) {
      return [...data].sort((a, b) => {
        let valA, valB;

        if (column === 'team') {
          valA = a.team.toLowerCase();
          valB = b.team.toLowerCase();
        } else if (column === 'total') {
          valA = a.rawTotal;
          valB = b.rawTotal;
        } else if (column === 'dropped') {
          valA = a.rawDropped !== null ? a.rawDropped : 999999;
          valB = b.rawDropped !== null ? b.rawDropped : 999999;
        } else if (column === 'final') {
          valA = a.rawFinal;
          valB = b.rawFinal;
        } else if (a.events.includes(column)) {
          valA = a.eventScores[column] !== null ? a.eventScores[column] : -999;
          valB = b.eventScores[column] !== null ? b.eventScores[column] : -999;
        } else {
          return 0;
        }

        if (valA < valB) return direction === 'asc' ? -1 : 1;
        if (valA > valB) return direction === 'asc' ? 1 : -1;
        return 0;
      });
    }

    function renderTable(data) {
      const header = document.getElementById("header-row");
      const tbody = document.getElementById("table-body");
      const events = data[0].events;

      header.innerHTML = `
        <th class="w-10 sticky left-0 bg-slate-800 z-20">#</th>
        <th class="text-left pl-4 sticky left-10 bg-slate-800 z-20 min-w-[170px]" data-column="team">
          Team <span class="sort-icon"></span>
        </th>
        <th class="min-w-[85px] font-medium" data-column="total">
          Total <span class="sort-icon"></span>
        </th>
        ${events.map(e => `
          <th class="min-w-[70px]" data-column="${e}">
            ${e} <span class="sort-icon"></span>
          </th>`).join('')}
        <th class="min-w-[80px]" data-column="dropped">
          Dropped <span class="sort-icon"></span>
        </th>
        <th class="font-bold bg-teal-900/60 min-w-[90px]" data-column="final">
          Final <span class="sort-icon"></span>
        </th>
      `;

      // Add click handlers
      header.querySelectorAll('th[data-column]').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.getAttribute('data-column');
          if (currentSort.column === col) {
            currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
          } else {
            currentSort.column = col;
            currentSort.direction = (col === 'team') ? 'asc' : 'desc';
          }
          renderTable(data); // re-render with new sort
        });
      });

      const sortedData = sortData(data, currentSort.column, currentSort.direction);

      tbody.innerHTML = "";
      sortedData.forEach((row, i) => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-slate-800/70";

        let cells = row.events.map(ev => {
          const score = row.eventScores[ev];
          if (score === null) return `<td class="future">—</td>`;

          const completedVals = Object.values(row.eventScores).filter(v => v !== null);
          const isDropped = completedVals.length >= 2 && score === Math.min(...completedVals);

          return `<td class="${isDropped ? 'text-orange-400 line-through' : 'text-slate-200'}">
                    ${score.toFixed(2)}
                  </td>`;
        }).join("");

        tr.innerHTML = `
          <td class="text-center font-mono text-slate-400 sticky left-0 bg-slate-900">${i+1}</td>
          <td class="text-left pl-4 sticky left-10 bg-slate-900 team-cell">
            <div class="team-name">${row.team}</div>
            <div class="owner-name">${row.owner}</div>
          </td>
          <td class="font-medium text-slate-300">${row.total}</td>
          ${cells}
          <td class="text-orange-400">${row.dropped}</td>
          <td class="font-bold text-teal-400 text-lg">${row.final}</td>
        `;
        tbody.appendChild(tr);
      });

      // Update sort icons
      document.querySelectorAll('.sort-icon').forEach(icon => {
        const th = icon.parentElement;
        const col = th.getAttribute('data-column');
        if (col === currentSort.column) {
          icon.textContent = currentSort.direction === 'asc' ? '↑' : '↓';
        } else {
          icon.textContent = '';
        }
      });
    }

    async function main() {
      try {
        const rows = await loadCSV();
        const standings = computeStandings(rows);
        renderTable(standings);
        document.getElementById("last-updated").textContent = `Last updated: ${new Date().toLocaleDateString('en-US', {month:'long', day:'numeric'})}`;
      } catch (e) {
        console.error(e);
        document.getElementById("error").classList.remove("hidden");
        document.getElementById("error").innerHTML = "Error loading scores.csv";
      }
    }

    window.onload = main;
  </script>
</body>
</html>
